name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_REGION:             ${{ secrets.VITE_FUNCTIONS_REGION }}
        run: npm run build

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Write functions .env
        run: |
          cat > functions/.env << ENVEOF
          KUSTOM_API_URL=${{ secrets.KUSTOM_API_URL }}
          KUSTOM_API_KEY=${{ secrets.KUSTOM_API_KEY }}
          KUSTOM_WEBHOOK_SECRET=${{ secrets.KUSTOM_WEBHOOK_SECRET }}
          SHOP_DOMAIN=${{ secrets.SHOP_DOMAIN }}
          ADMIN_EMAIL_GROUP=${{ secrets.ADMIN_EMAIL_GROUP }}
          GCP_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          GOOGLE_ADMIN_EMAIL=${{ secrets.GOOGLE_ADMIN_EMAIL }}
          GOOGLE_GROUPS_SITE_ADMIN=${{ secrets.GOOGLE_GROUPS_SITE_ADMIN }}
          GOOGLE_GROUPS_SHOP_ADMIN=${{ secrets.GOOGLE_GROUPS_SHOP_ADMIN }}
          ENVEOF

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
        run: |
          firebase deploy \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --non-interactive
            --force

      - name: Remove service account key
        if: always()
        run: rm -f /tmp/sa-key.json
