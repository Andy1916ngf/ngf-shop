name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # required for service account auth

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_REGION:             europe-west1
        run: npm run build

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      # Write functions/.env from GitHub Secrets so it is available at deploy time.
      # Never commit this file — it is listed in .gitignore.
      - name: Write functions .env
        run: |
          cat > functions/.env << ENVEOF
          KUSTOM_API_URL=${{ secrets.KUSTOM_API_URL }}
          KUSTOM_API_KEY=${{ secrets.KUSTOM_API_KEY }}
          KUSTOM_WEBHOOK_SECRET=${{ secrets.KUSTOM_WEBHOOK_SECRET }}
          SHOP_DOMAIN=${{ secrets.SHOP_DOMAIN }}
          ADMIN_EMAIL_GROUP=${{ secrets.ADMIN_EMAIL_GROUP }}
          FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          GOOGLE_ADMIN_EMAIL=${{ secrets.GOOGLE_ADMIN_EMAIL }}
          GOOGLE_GROUPS_SITE_ADMIN=${{ secrets.GOOGLE_GROUPS_SITE_ADMIN }}
          GOOGLE_GROUPS_SHOP_ADMIN=${{ secrets.GOOGLE_GROUPS_SHOP_ADMIN }}
          ENVEOF

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deploy Functions, Firestore rules and Storage rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore,storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

# ── GitHub Secrets required ────────────────────────────────────
# Repository → Settings → Secrets and variables → Actions → New repository secret
#
# Auth (no local Firebase CLI needed — use a service account key instead):
#   FIREBASE_SERVICE_ACCOUNT  ← Google Cloud Console → IAM → Service Accounts
#                                → create key (JSON) → paste the entire JSON value
#
# Firebase client config (Firebase Console → Project Settings → Your apps):
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#
# Functions runtime env:
#   KUSTOM_API_URL            https://api.playground.kustom.co (sandbox)
#   KUSTOM_API_KEY            Kustom Portal → Settings → API credentials
#   KUSTOM_WEBHOOK_SECRET     Kustom Portal → Settings → Webhooks
#   SHOP_DOMAIN               https://butik.nynashamnsgf.se
#   ADMIN_EMAIL_GROUP         butik@nynashamnsgf.se
#   GOOGLE_ADMIN_EMAIL        your-admin@nynashamnsgf.se
#   GOOGLE_GROUPS_SITE_ADMIN  shop-site-admins@nynashamnsgf.se
#   GOOGLE_GROUPS_SHOP_ADMIN  shop-admins@nynashamnsgf.se
